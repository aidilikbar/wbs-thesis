name: wbs_thesis

services:
  backend:
    build:
      context: ../..
      dockerfile: docker/wbs-thesis-services/backend.Dockerfile
    container_name: wbs_thesis_backend
    restart: unless-stopped
    working_dir: /app
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8000
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_DATABASE: wbs_thesis
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SESSION_DRIVER: file
      REDIS_HOST: redis
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_BUCKET: wbs-attachments-dev
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: http://localhost:9000/wbs-attachments-dev
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ../../backend:/app
    depends_on:
      - minio
      - minio_init
    networks:
      - wbs_thesis

  frontend:
    build:
      context: ../..
      dockerfile: docker/wbs-thesis-services/frontend.Dockerfile
    container_name: wbs_thesis_frontend
    restart: unless-stopped
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - wbs_thesis

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: wbs_thesis_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - wbs_thesis

  minio_init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: wbs_thesis_minio_init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/wbs-attachments-dev;
      /usr/bin/mc anonymous set none local/wbs-attachments-dev;
      exit 0;
      "
    networks:
      - wbs_thesis

  redis:
    image: redis:7-alpine
    container_name: wbs_thesis_redis
    restart: unless-stopped
    profiles: ["cache"]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wbs_thesis

volumes:
  miniodata:
    name: wbs_thesis_miniodata
  redisdata:
    name: wbs_thesis_redisdata
  frontend_node_modules:
    name: wbs_thesis_frontend_node_modules

networks:
  wbs_thesis:
    name: wbs_thesis
