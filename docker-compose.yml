services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: wbs_thesis_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata_wbs_thesis:/data
    networks:
      - wbs_thesis

  minio_init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: wbs_thesis_minio_init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/wbs-attachments-dev;
      /usr/bin/mc anonymous set none local/wbs-attachments-dev;
      exit 0;
      "
    networks:
      - wbs_thesis

  redis:
    image: redis:7-alpine
    container_name: wbs_thesis_redis
    restart: unless-stopped
    profiles: ["cache"]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata_wbs_thesis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wbs_thesis

volumes:
  miniodata_wbs_thesis:
  redisdata_wbs_thesis:

networks:
  wbs_thesis:
